name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4

    - name: Download Gradle
      run: |
        cd ${{ github.workspace }}
        wget -q https://services.gradle.org/distributions/gradle-8.1-bin.zip
        unzip -q gradle-8.1-bin.zip

    - name: Build with Gradle
      run: |
        cd ${{ github.workspace }}
        ./gradle-8.1/bin/gradle assembleDebug

    - name: Find APK
      run: |
        echo "Searching for APK files..."
        find ${{ github.workspace }} -name "*.apk" -type f
        echo "---"
        ls -la ${{ github.workspace }}/app/build/outputs/apk/ || echo "apk directory not found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: ${{ github.workspace }}/app/build/outputs/apk/debug/*.apk
        retention-days: 30
